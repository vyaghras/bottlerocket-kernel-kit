name: "Node setup"
description: "Performs setup for caching and other common needs."
runs:
  using: "composite"
  steps:
    - run: sudo apt -y install build-essential openssl libssl-dev pkg-config liblz4-tool clang
      shell: bash
    - uses: actions/cache/restore@d4323d4df104b026a6aa633fdb11d772146be0bf
      # Restore most recent cache if available.
      with:
        path: |
          ~/.cargo
          .cargo
          .gomodcache
          build/external-kits
          build/rpms
          build/state
          target
        key: build-cache
    - run: cargo install cargo-make
      shell: bash
